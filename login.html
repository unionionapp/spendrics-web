<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --border:rgba(0,0,0,.1);
  --border-focus:rgba(239,65,54,.5);
  --ink:#1d1d1f;
  --ink2:#3d3d3f;
  --ink3:#86868b;
  --ink4:#c7c7cc;
  --red:#ef4136;
  --orange:#f5a623;
  --grad:linear-gradient(135deg,#ef4136,#f5a623);
  --danger:#d93025;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 16px 48px rgba(0,0,0,.08);
}

html,body{height:100%;min-height:100vh}
body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  position:relative;
}

/* Subtle background texture */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239,65,54,.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,166,35,.04) 0%, transparent 60%);
  pointer-events:none;
}

/* Back link */
.back{
  position:fixed;top:24px;left:24px;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  text-decoration:none;color:var(--ink3);
  transition:all .2s;z-index:10;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.back:hover{border-color:rgba(0,0,0,.18);color:var(--ink);transform:translateX(-2px)}

/* Card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:44px 40px 36px;
  width:100%;
  max-width:400px;
  position:relative;
  z-index:1;
  box-shadow:var(--shadow);
  animation:rise .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{
  from{opacity:0;transform:translateY(16px) scale(.98)}
  to{opacity:1;transform:none}
}

/* Logo */
.logo-wrap{display:flex;justify-content:center;margin-bottom:32px}

/* Headline */
.card-title{
  font-size:24px;font-weight:800;
  letter-spacing:-.8px;
  color:var(--ink);
  margin-bottom:5px;
  text-align:center;
}
.card-sub{
  font-size:13px;color:var(--ink3);
  margin-bottom:28px;
  text-align:center;
  font-weight:500;
}

/* Error banner */
.error-banner{
  display:none;align-items:center;gap:9px;
  background:rgba(217,48,37,.07);
  border:1px solid rgba(217,48,37,.2);
  border-radius:10px;
  padding:11px 14px;
  font-size:13px;color:var(--danger);
  margin-bottom:18px;
  font-weight:500;
}
.error-banner.show{display:flex}
.error-banner svg{flex-shrink:0}

/* Fields */
.field{margin-bottom:14px}
.field-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:7px;
}
label{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:1.8px;
  color:var(--ink3);text-transform:uppercase;
  font-weight:600;
}
.forgot{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--ink4);text-decoration:none;
  letter-spacing:.5px;transition:color .15s;
}
.forgot:hover{color:var(--red)}

/* Input wrapper (for password toggle) */
.input-wrap{position:relative}
.input-wrap input{padding-right:44px}

input[type="email"],
input[type="password"],
input[type="text"]{
  width:100%;
  padding:12px 16px;
  background:#fafafa;
  border:1px solid rgba(0,0,0,.12);
  border-radius:10px;
  color:var(--ink);
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color .18s,box-shadow .18s,background .18s;
  -webkit-appearance:none;
}
input:focus{
  background:#fff;
  border-color:var(--border-focus);
  box-shadow:0 0 0 3px rgba(239,65,54,.1);
}
input::placeholder{color:var(--ink4)}
input.err{
  border-color:rgba(217,48,37,.4);
  box-shadow:0 0 0 3px rgba(217,48,37,.08);
}

/* Password toggle button */
.pw-toggle{
  position:absolute;right:0;top:0;bottom:0;
  width:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:none;border:none;
  color:var(--ink4);
  transition:color .15s;
  border-radius:0 10px 10px 0;
}
.pw-toggle:hover{color:var(--ink2)}

/* Field error */
.field-err{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--danger);
  margin-top:5px;display:none;
}
.field-err.show{display:block}

/* Submit button */
.btn-submit{
  width:100%;
  padding:13px;
  font-size:15px;font-weight:700;
  background:var(--grad);
  color:#fff;border:none;
  border-radius:11px;
  cursor:pointer;
  font-family:'Bricolage Grotesque',sans-serif;
  transition:opacity .18s,transform .18s,box-shadow .18s;
  margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(239,65,54,.28);
  letter-spacing:-.2px;
}
.btn-submit:hover:not(:disabled){
  opacity:.92;
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(239,65,54,.38);
}
.btn-submit:active:not(:disabled){transform:translateY(0);opacity:1}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

/* Spinner */
.spin{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .65s linear infinite;
  display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.divider{
  display:flex;align-items:center;gap:10px;
  margin:22px 0 16px;
  color:var(--ink4);
  font-family:'DM Mono',monospace;font-size:10px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Footer */
.foot-note{
  text-align:center;
  font-size:13px;color:var(--ink3);
  margin-bottom:10px;
}
.foot-note a{
  color:var(--ink2);text-decoration:none;
  font-weight:600;transition:color .15s;
}
.foot-note a:hover{color:var(--red)}

.admin-note{
  text-align:center;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--ink4);
  padding-top:12px;
  border-top:1px solid var(--border);
  margin-top:4px;
}
.admin-note a{
  color:var(--ink3);text-decoration:none;transition:color .15s;
}
.admin-note a:hover{color:var(--red)}
</style>

<script>
const API = 'https://spendrics-api.onrender.com/api/v1';

// ── Pre-warm: ping the server as soon as the page loads ────────
// Render free tier sleeps after 15 min inactivity. Pinging now
// means the server wakes while the user types — login feels instant.
(function prewarm() {
  const start = Date.now();
  fetch(API + '/health', { method: 'GET', cache: 'no-store' })
    .then(() => console.debug('[prewarm] server awake in ' + (Date.now()-start) + 'ms'))
    .catch(() => {});
})();

// ── Password toggle ────────────────────────────────────────────
function togglePassword() {
  const input   = document.getElementById('password');
  const iconEye    = document.getElementById('icon-eye');
  const iconEyeOff = document.getElementById('icon-eye-off');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  iconEye.style.display    = isHidden ? 'none'  : '';
  iconEyeOff.style.display = isHidden ? ''      : 'none';
}

// ── Error helpers ─────────────────────────────────────────────
function showErr(msg) {
  document.getElementById('err-text').textContent = msg;
  document.getElementById('err-banner').classList.add('show');
}
function hideErr() {
  document.getElementById('err-banner').classList.remove('show');
}

// ── Login form ────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideErr();

  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  let valid   = true;

  // Reset errors
  ['email','password'].forEach(id => {
    document.getElementById(id).classList.remove('err');
  });
  document.getElementById('email-err').classList.remove('show');
  document.getElementById('pass-err').classList.remove('show');

  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('email-err').classList.add('show');
    document.getElementById('email').classList.add('err');
    valid = false;
  }
  if (!pass) {
    document.getElementById('pass-err').classList.add('show');
    document.getElementById('password').classList.add('err');
    valid = false;
  }
  if (!valid) return;

  // Loading state
  const btnText  = document.getElementById('btn-text');
  const btnArrow = document.getElementById('btn-arrow');
  const spinEl   = document.getElementById('spin');
  const submitBtn = document.getElementById('submit-btn');
  btnText.style.display  = 'none';
  btnArrow.style.display = 'none';
  spinEl.style.display   = 'block';
  submitBtn.disabled     = true;

  // Wake-up hint after 5s (Render free tier cold start)
  const wakeTimer = setTimeout(() => {
    btnText.textContent = 'Waking up server…';
    btnText.style.display = 'block';
  }, 5000);

  function resetBtn() {
    clearTimeout(wakeTimer);
    btnText.textContent    = 'Sign In';
    btnText.style.display  = 'block';
    btnArrow.style.display = 'block';
    spinEl.style.display   = 'none';
    submitBtn.disabled     = false;
  }

  const MAX_RETRIES = 3;
  // First attempt: 65s — covers Render free-tier cold start (~60s)
  // Retry attempts: 20s — server should already be awake by then
  const timeoutFor = (attempt) => attempt === 1 ? 65000 : 20000;

  let lastErr = null;

  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    if (attempt > 1) {
      // Update label and pause briefly before each retry
      clearTimeout(wakeTimer);
      btnText.textContent   = `Retrying… (${attempt}/${MAX_RETRIES})`;
      btnText.style.display = 'block';
      spinEl.style.display  = 'block';
      await new Promise(r => setTimeout(r, 1500));
    }

    try {
      const controller = new AbortController();
      const timeoutId  = setTimeout(() => controller.abort(), timeoutFor(attempt));

      const res = await fetch(API + '/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password: pass }),
        signal:  controller.signal,
      });
      clearTimeout(timeoutId);

      const data = await res.json();

      // Auth / business errors → no point retrying
      if (!res.ok) {
        resetBtn();
        showErr(data.detail || 'Invalid email or password.');
        return;
      }

      // ── Success ───────────────────────────────────────────────
      clearTimeout(wakeTimer);
      localStorage.setItem('spr_token', data.access_token);
      localStorage.setItem('spr_session', JSON.stringify({
        id:           data.user.id,
        display_name: data.user.display_name,
        name:         data.user.display_name || data.user.email,
        email:        data.user.email,
        role:         data.user.role,
        plan:         data.user.plan || 'free',
      }));
      window.location.href = 'dashboard.html';
      return;

    } catch (err) {
      lastErr = err;
      // Only retry on timeout (AbortError) or network failure (TypeError)
      if (err.name !== 'AbortError' && !(err instanceof TypeError)) break;
      if (attempt === MAX_RETRIES) break;
      // loop → next attempt
    }
  }

  // All attempts exhausted
  resetBtn();
  if (lastErr?.name === 'AbortError') {
    showErr(`Server didn't respond after ${MAX_RETRIES} attempts. Please try again in a moment.`);
  } else {
    showErr(lastErr?.message || 'Something went wrong. Please try again.');
  }
});
</script>
