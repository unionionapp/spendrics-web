<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c056d;--bg2:#07044e;--surface:#130a78;--border:#1c0e8c;--border2:#271899;
  --red:#ef4136;--orange:#fbb040;--yellow:#ffde5a;
  --accent-glow:rgba(251,176,64,0.18);
  --ink:#ffffff;--ink2:rgba(255,255,255,0.72);--ink3:rgba(255,255,255,0.38);
  --danger:#ff6b6b;--success:#4af0c8;
}
html,body{height:100%}
body{font-family:'Bricolage Grotesque',sans-serif;background:#0c056d;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;overflow:hidden}

/* BG grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
/* BG glow */
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(239,65,54,.12) 0%,rgba(251,176,64,.06) 50%,transparent 70%);pointer-events:none}

/* Back link */
.back{position:fixed;top:24px;left:28px;display:flex;align-items:center;gap:8px;text-decoration:none;color:rgba(255,255,255,.45);font-size:13px;transition:color .2s;z-index:10}
.back:hover{color:rgba(255,255,255,.8)}

/* Card */
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.4),0 0 80px rgba(239,65,54,.08)}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(251,176,64,.5),transparent)}

/* Logo */
.card-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}




.card-title{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;color:#fff}
.card-sub{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:32px}

/* Form */
.field{margin-bottom:16px}
label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:7px}
input{width:100%;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:9px;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:rgba(251,176,64,.5);box-shadow:0 0 0 3px rgba(251,176,64,.1)}
input::placeholder{color:rgba(255,255,255,.3)}
input.err{border-color:rgba(255,107,107,.45);box-shadow:0 0 0 3px rgba(255,107,107,.1)}

.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.forgot{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.4);text-decoration:none;letter-spacing:1px;transition:color .2s}
.forgot:hover{color:var(--yellow)}

/* Error message */
.error-msg{font-size:12px;color:#ff9090;margin-top:5px;display:none}
.error-msg.show{display:block}

/* Global error banner */
.error-banner{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);border-radius:8px;padding:12px 16px;font-size:13px;color:#ff9090;margin-bottom:20px;display:none;align-items:center;gap:8px}
.error-banner.show{display:flex}

/* Submit */
.btn-submit{width:100%;padding:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#ef4136,#fbb040);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 24px rgba(239,65,54,.35)}
.btn-submit:hover:not(:disabled){background:linear-gradient(135deg,#d63028,#e89830);transform:translateY(-1px);box-shadow:0 6px 32px rgba(239,65,54,.5)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;font-size:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

.foot-note{text-align:center;font-size:12px;color:rgba(255,255,255,.45);margin-top:24px}
.foot-note a{color:rgba(255,255,255,.72);text-decoration:none;transition:color .2s}
.foot-note a:hover{color:var(--yellow)}

/* Admin access note */
.admin-note{background:rgba(255,222,90,.05);border:1px solid rgba(255,222,90,.15);border-radius:8px;padding:10px 14px;font-size:11px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace;margin-top:20px;text-align:center}
.admin-note a{color:var(--yellow);text-decoration:none}
</style>
</head>

  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Sign in to your Spendrics account</p>

  <div class="error-banner" id="err-banner">
    <span>⚠</span>
    <span id="err-text">Invalid email or password.</span>
  </div>

  <form id="login-form" novalidate>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
      <div class="error-msg" id="email-err">Please enter a valid email.</div>
    </div>

    <div class="field">
      <div class="field-row">
        <label for="password" style="margin-bottom:0">Password</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="error-msg" id="pass-err">Password is required.</div>
    </div>

    <button type="submit" class="btn-submit" id="submit-btn">
      <span id="btn-text">Sign In →</span>
      <div class="spin" id="spin"></div>
    </button>
  </form>

  <div class="divider">OR</div>
  <p class="foot-note">Don't have an account? <a href="index.html#pricing">View plans</a></p>

  <div class="admin-note">
    Admin? <a href="admin.html">Access member management →</a>
  </div>
</div>

<script>
const API = 'https://spendrics-api.onrender.com/api/v1';

function showErr(msg) {
  document.getElementById('err-text').textContent = msg;
  document.getElementById('err-banner').classList.add('show');
}
function hideErr() {
  document.getElementById('err-banner').classList.remove('show');
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideErr();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  let valid = true;

  document.getElementById('email-err').classList.remove('show');
  document.getElementById('pass-err').classList.remove('show');
  document.getElementById('email').classList.remove('err');
  document.getElementById('password').classList.remove('err');

  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('email-err').classList.add('show');
    document.getElementById('email').classList.add('err');
    valid = false;
  }
  if (!pass) {
    document.getElementById('pass-err').classList.add('show');
    document.getElementById('password').classList.add('err');
    valid = false;
  }
  if (!valid) return;

  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('spin').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || 'Invalid email or password.');
    }

    // Store token and user info
    localStorage.setItem('spr_token', data.access_token);
    localStorage.setItem('spr_session', JSON.stringify({
      id: data.user.id,
      name: data.user.name,
      email: data.user.email,
      role: data.user.role,
      plan: data.user.plan
    }));

    // Redirect based on role
    window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';

  } catch (err) {
    document.getElementById('btn-text').style.display = 'block';
    document.getElementById('spin').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    showErr(err.message || 'Something went wrong. Please try again.');
  }
});
</script>
