<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Spendrics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04050a;--bg2:#080a12;--surface:#0d1020;--border:#161b2e;--border2:#1f2640;
  --lime:#c6f135;--lime2:#b0d820;
  --ink:#f0f2fc;--ink2:#8892b0;--ink3:#3d4461;
  --danger:#f04a4a;--success:#4af0c8;--warn:#f0c84a;
  --blue:#4a7cf6;--pink:#f04a8c;
  --grad:linear-gradient(135deg,#ef4136,#fbb040);
}
html,body{height:100%}
body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--ink);display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);height:100vh;display:flex;flex-direction:column}
.s-logo{padding:18px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.s-nav{padding:16px 10px;flex:1}
.sn-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--ink3);padding:0 8px;margin-bottom:8px;margin-top:12px}
.sn-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--ink3);font-size:13px;transition:all .15s;user-select:none}
.sn-item:hover{background:var(--surface);color:var(--ink)}
.sn-item.active{background:rgba(198,241,53,.08);color:var(--lime)}
.sn-icon{font-size:14px;width:18px;text-align:center}
.s-foot{padding:14px 10px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px}
.ua{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--pink));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.un{font-size:12px;font-weight:600}
.ur{font-family:'DM Mono',monospace;font-size:9px;color:var(--lime)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--ink3);font-size:12px;cursor:pointer;border-radius:7px;margin-top:4px;transition:all .15s;border:none;background:transparent;font-family:inherit;width:100%}
.logout-btn:hover{background:var(--surface);color:var(--danger)}
.back-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;color:var(--ink3);font-size:12px;cursor:pointer;border-radius:7px;transition:all .15s;text-decoration:none;margin-bottom:4px}
.back-btn:hover{background:var(--surface);color:var(--ink)}

/* MAIN */
.main{flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:58px;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.tb-title{font-size:18px;font-weight:700;letter-spacing:-.5px}
.tb-right{display:flex;align-items:center;gap:10px}
.badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px}
.badge.admin{background:rgba(198,241,53,.1);color:var(--lime);border:1px solid rgba(198,241,53,.2)}
.badge.owner{background:rgba(74,124,246,.1);color:var(--blue);border:1px solid rgba(74,124,246,.2)}

/* BODY */
.body-area{flex:1;overflow-y:auto;padding:28px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.4}
.stat-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);margin-top:4px}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--border2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.role-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid;display:inline-block}
.role-badge.owner{color:var(--blue);border-color:rgba(74,124,246,.3);background:rgba(74,124,246,.08)}
.role-badge.admin{color:var(--lime);border-color:rgba(198,241,53,.3);background:rgba(198,241,53,.06)}
.role-badge.analyst{color:var(--warn);border-color:rgba(240,200,74,.3);background:rgba(240,200,74,.06)}
.role-badge.viewer{color:var(--ink3);border-color:var(--border2);background:rgba(255,255,255,.03)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.active{background:var(--success)}
.status-dot.inactive{background:var(--danger)}

/* BUTTONS */
.btn{font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;border-radius:7px;cursor:pointer;border:1px solid;transition:all .15s}
.btn.primary{background:var(--grad);border:none;color:#fff;font-weight:700}
.btn.primary:hover{opacity:.85}
.btn.ghost{background:transparent;border-color:var(--border2);color:var(--ink3)}
.btn.ghost:hover{border-color:var(--lime);color:var(--lime)}
.btn.danger{background:transparent;border-color:rgba(240,74,74,.3);color:var(--danger)}
.btn.danger:hover{background:rgba(240,74,74,.1)}
.btn-icon{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);transition:all .15s}
.btn-icon:hover{border-color:var(--border2);color:var(--ink)}
.btn-icon.del:hover{border-color:rgba(240,74,74,.3);color:var(--danger)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#080a12;border:1px solid var(--border2);border-radius:16px;padding:28px;width:420px;max-width:90vw;transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:none}
.modal-ttl{font-size:18px;font-weight:800;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--ink3);text-transform:uppercase;margin-bottom:7px}
.field input,.field select{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:8px;color:var(--ink);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--lime)}
.field select option{background:#080a12}
.modal-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.empty{text-align:center;padding:48px;color:var(--ink3)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-ttl{font-size:16px;font-weight:700}
</style>
</head>

<script>
const API = 'https://spendrics-api.onrender.com/api/v1';
let token = localStorage.getItem('spr_token');
let session = JSON.parse(localStorage.getItem('spr_session') || 'null');
if (!token || !session) window.location.href = 'login.html';
if (session?.role !== 'admin' && session?.role !== 'owner') {
  alert('Admin access required.'); window.location.href = 'dashboard.html';
}

// User info
if (session) {
  document.getElementById('a-name').textContent = session.display_name || session.name || session.email;
  document.getElementById('a-role').textContent = (session.role||'').toUpperCase();
  document.getElementById('a-av').textContent = ((session.display_name||session.name||'A')[0]).toUpperCase();
}

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{})},
    ...opts
  });
  if (res.status === 401) { logout(); return null; }
  if (res.status === 204) return null;
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.detail||`Error ${res.status}`); }
  return res.json();
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

function showSection(name, el) {
  document.querySelectorAll('#section-users,#section-stats').forEach(s=>s.style.display='none');
  document.querySelectorAll('.sn-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('section-'+name).style.display = 'block';
  if (el) el.classList.add('active');
  const titles = {users:'Member Management', stats:'Tenant Statistics'};
  document.getElementById('section-title').textContent = titles[name]||name;
  if (name === 'stats') loadStats();
}

async function loadUsers() {
  try {
    const users = await api('/admin/users') || [];
    // Set tenant badge
    if (users.length) document.getElementById('tenant-badge').textContent = users[0].tenant_id?.slice(0,8)+'…';
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--ink3)">No users found</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td style="font-weight:600">${u.display_name||'—'}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2)">${u.email}</td>
        <td><span class="role-badge ${u.role}">${u.role}</span></td>
        <td><span class="status-dot ${u.is_active?'active':'inactive'}"></span>${u.is_active?'Active':'Inactive'}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)">${new Date(u.created_at).toLocaleDateString()}</td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="btn-icon" onclick="editUser('${u.id}','${u.display_name||''}','${u.email}','${u.role}')" title="Edit">✎</button>
            <button class="btn-icon" onclick="toggleActive('${u.id}',${u.is_active})" title="${u.is_active?'Deactivate':'Activate'}">${u.is_active?'⏸':'▶'}</button>
            <button class="btn-icon del" onclick="deleteUser('${u.id}')" title="Delete">✕</button>
          </div>
        </td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('users-tbody').innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--danger)">${e.message}</td></tr>`;
  }
}

async function loadStats() {
  try {
    const s = await api('/admin/stats');
    document.getElementById('stat-users').textContent     = s.total_users;
    document.getElementById('stat-brands').textContent    = s.total_brands;
    document.getElementById('stat-campaigns').textContent = s.total_campaigns;
    document.getElementById('stat-active').textContent    = s.active_campaigns;
  } catch(e) { console.error(e); }
}

function openCreateUser() {
  document.getElementById('modal-user-title').textContent = 'Add Member';
  document.getElementById('user-edit-id').value = '';
  document.getElementById('u-display-name').value = '';
  document.getElementById('u-email').value = '';
  document.getElementById('u-email').disabled = false;
  document.getElementById('u-role').value = 'analyst';
  document.getElementById('u-password').value = '';
  document.getElementById('password-field').style.display = 'block';
  document.getElementById('modal-user').classList.add('open');
}

function editUser(id, name, email, role) {
  document.getElementById('modal-user-title').textContent = 'Edit Member';
  document.getElementById('user-edit-id').value = id;
  document.getElementById('u-display-name').value = name;
  document.getElementById('u-email').value = email;
  document.getElementById('u-email').disabled = true;
  document.getElementById('u-role').value = role;
  document.getElementById('u-password').value = '';
  document.getElementById('password-field').style.display = 'block';
  document.getElementById('modal-user').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-user').classList.remove('open');
}

async function saveUser() {
  const id   = document.getElementById('user-edit-id').value;
  const name = document.getElementById('u-display-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const role = document.getElementById('u-role').value;
  const pass = document.getElementById('u-password').value;

  try {
    if (id) {
      // Edit
      const body = {display_name: name, role};
      if (pass) body.password = pass;
      await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify(body)});
    } else {
      // Create
      if (!email || !pass) return alert('Email and password are required');
      await api('/admin/users', {method:'POST', body:JSON.stringify({email, display_name:name, role, password:pass})});
    }
    closeModal();
    loadUsers();
  } catch(e) { alert(e.message); }
}

async function toggleActive(id, currentlyActive) {
  try {
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({is_active: !currentlyActive})});
    loadUsers();
  } catch(e) { alert(e.message); }
}

async function deleteUser(id) {
  if (!confirm('Permanently delete this user?')) return;
  try { await api(`/admin/users/${id}`, {method:'DELETE'}); loadUsers(); }
  catch(e) { alert(e.message); }
}

document.getElementById('modal-user').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-user')) closeModal();
});

// Init
loadUsers();
</script>
</body>
</html>
